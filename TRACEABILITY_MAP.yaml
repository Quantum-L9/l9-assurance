schema: l9.traceability-map/v1
repository: Quantum-L9/l9-assurance
release: 2.1.1
requirements:
  - id: PY-001
    requirement: Python is the authoritative runtime
    implementation:
      - pyproject.toml
      - src/l9_assurance
    validation:
      - tests/architecture/test_architecture.py
      - scripts/validate_boundaries.py
  - id: PROTOCOL-001
    requirement: JSON Schema remains authoritative and embedded assets cannot drift
    implementation:
      - schemas/v1
      - scripts/sync_protocol_bundle.py
      - src/l9_assurance/protocol/release-zero/manifest.json
    validation:
      - tests/contract/test_schemas.py
      - scripts/validate_schemas.py
  - id: EVIDENCE-001
    requirement: Evidence is bounded, authorized, exact-subject-bound, fresh, integral, and replay-safe
    implementation:
      - src/l9_assurance/evidence
    validation:
      - tests/unit/test_validation_admission.py
      - tests/security/test_security.py
  - id: DECISION-001
    requirement: Verdicts are deterministic and distinguish positive failure from missing knowledge
    implementation:
      - src/l9_assurance/controls/evaluate.py
      - src/l9_assurance/evaluator/evaluate.py
    validation:
      - tests/integration/test_engine.py
      - tests/contract/test_verification.py
  - id: CLI-001
    requirement: One fail-closed executable ingress preserves the nine-command contract
    implementation:
      - src/l9_assurance/cli/app.py
      - src/l9_assurance/cli/catalog.py
    validation:
      - tests/unit/test_cli.py
  - id: CONFORMANCE-001
    requirement: Producers are admission-conformant and consumers preserve decision bytes
    implementation:
      - src/l9_assurance/conformance
    validation:
      - tests/conformance/test_conformance.py
  - id: REPLAY-001
    requirement: Canonical decisions and summaries replay byte-identically
    implementation:
      - fixtures/replay/pull-request-pass
      - scripts/verify_replay.py
    validation:
      - tests/replay/test_replay.py
  - id: BOUNDARY-001
    requirement: Assurance owns no execution, orchestration, publication, mutation, debt, or LSP authority
    implementation:
      - ARCHITECTURE.md
      - src/l9_assurance
    validation:
      - scripts/validate_boundaries.py
      - tests/architecture/test_architecture.py

  - id: HARNESS-001
    requirement: The Python CLI preserves the executable and artifact seam consumed by L9 Harness
    implementation:
      - src/l9_assurance/cli/app.py
      - src/l9_assurance/cli/io.py
      - docs/reviews/HARNESS_2_0_4_COMPATIBILITY.md
    validation:
      - uploaded Harness 2.0.4 capture_plan adapter
      - uploaded Harness 2.0.4 evaluate adapter
      - l9-assurance verify-plan
      - l9-assurance verify
  - id: L9META-001
    requirement: Every release file has deterministic L9 metadata without mutating canonical protocol bytes
    implementation:
      - .l9/repo-spec.yaml
      - .l9/L9_META.jsonl
      - scripts/generate_l9_meta.py
      - scripts/repository_files.py
    validation:
      - scripts/validate_l9_alignment.py
      - scripts/generate_l9_meta.py --check
      - tests/architecture/test_l9_alignment.py
  - id: REPLAY-002
    requirement: Replay state is append-only, bounded, conflict-detecting, non-evicting, and fail-closed
    implementation:
      - src/l9_assurance/evidence/replay.py
      - src/l9_assurance/evidence/admission.py
    validation:
      - tests/replay/test_replay.py
      - scripts/validate_l9_alignment.py
  - id: ALIGN-001
    requirement: TransportPacket and Gate applicability are explicit and runtime boundaries are machine-enforced
    implementation:
      - .l9/repo-spec.yaml
      - ALIGNMENT_REPORT.md
      - AGENTS.md
    validation:
      - scripts/validate_l9_alignment.py
      - tests/architecture/test_l9_alignment.py
  - id: DIST-002
    requirement: Distribution validation proves the candidate wheel, not an ambient installation, is exercised
    implementation:
      - scripts/ci.py
    validation:
      - isolated wheel force-install
      - module-origin assertion
