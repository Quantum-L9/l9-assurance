name: assurance-validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'rewrite/**'
      - 'migration/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: assurance-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Python assurance plane
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade setuptools wheel
          python -m pip install --disable-pip-version-check -e .[dev]

      - name: Run repository gates
        run: python scripts/ci.py
