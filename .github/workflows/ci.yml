name: assurance-validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'rewrite/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: assurance-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  validate:
    name: Validate Release zero
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Run repository gates
        run: npm run ci

      - name: Verify workspace package manifests
        shell: bash
        run: |
          mkdir -p artifacts
          npm pack --workspaces --dry-run --json > artifacts/npm-pack-dry-run.json
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const packages = JSON.parse(readFileSync('artifacts/npm-pack-dry-run.json', 'utf8'));
          if (!Array.isArray(packages) || packages.length !== 8) {
            throw new Error(`Expected eight package dry-runs; received ${Array.isArray(packages) ? packages.length : 'non-array output'}.`);
          }
          NODE
